# =============================================================================
# docker-compose.prod.yml — Produção Bendita Coxinha
#
# COMO USAR (primeira vez):
#   cd /opt/benditacoxinha/deploy
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Atualizar:
#   bash /opt/benditacoxinha/deploy/update.sh
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX — Único serviço exposto ao mundo (porta 80)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: benditacoxinha_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - api_uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - api
    networks:
      - benditacoxinha_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # FRONTEND — Next.js 14
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_URL: https://benditacoxinha.com.br
    image: benditacoxinha_frontend:latest
    container_name: benditacoxinha_frontend
    networks:
      - benditacoxinha_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API — ASP.NET Core 8
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../BenditaCoxinha
      dockerfile: Dockerfile
    image: benditacoxinha_api:latest
    container_name: benditacoxinha_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Banco de dados
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-benditacoxinha};Username=${POSTGRES_USER:-bendita_user};Password=${POSTGRES_PASSWORD}"
      # JWT
      JwtSettings__SecretKey: "${JWT_SECRET}"
      JwtSettings__Issuer: "https://benditacoxinha.com.br"
      JwtSettings__Audience: "BenditaCoxinha-Frontend"
      JwtSettings__AccessTokenExpirationMinutes: "480"
      JwtSettings__RefreshTokenExpirationDays: "90"
      # E-mail
      EmailSettings__Host: "${SMTP_HOST:-smtp.resend.com}"
      EmailSettings__Port: "${SMTP_PORT:-587}"
      EmailSettings__User: "${SMTP_USERNAME:-resend}"
      EmailSettings__Password: "${SMTP_PASSWORD}"
      EmailSettings__From: "${SMTP_FROM_EMAIL:-noreply@benditacoxinha.com.br}"
      EmailSettings__AppUrl: "https://benditacoxinha.com.br"
      # Integrações
      GeminiSettings__ApiKey: "${GEMINI_API_KEY}"
      # Segurança
      ADMIN_SEED_PASSWORD: "${ADMIN_SEED_PASSWORD}"
      COOKIE_SECURE: "true"
      CorsSettings__AllowedOrigins: "https://benditacoxinha.com.br,https://www.benditacoxinha.com.br"
    volumes:
      - api_uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - benditacoxinha_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Banco relacional (único banco de dados)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: benditacoxinha_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-benditacoxinha}
      POSTGRES_USER:     ${POSTGRES_USER:-bendita_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - benditacoxinha_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bendita_user} -d ${POSTGRES_DB:-benditacoxinha}"]
      interval: 10s
      timeout: 5s
      retries: 5

# -----------------------------------------------------------------------------
# Volumes persistentes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  api_uploads:

# -----------------------------------------------------------------------------
# Rede interna Docker
# -----------------------------------------------------------------------------
networks:
  benditacoxinha_network:
    driver: bridge
